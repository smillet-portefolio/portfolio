name: Update prix Google Sheets (2x/jour)

# À placer dans le repo sous : .github/workflows/update-prices.yml
#
# GitHub cron = UTC, sans heure d'été, et "best effort" (souvent retardé).
# On programme 4 horaires UTC (couvrant été CEST=UTC+2 et hiver CET=UTC+1),
# à la minute 17 pour éviter la congestion du "pile à l'heure". Un garde
# classe ensuite par demi-journée (Prague) : matin = créer/live, soir = geler.
# Robuste aux retards : toute exécution déclenchée s'exécute (idempotent).
#   04:17 / 05:17 UTC -> matin Prague (06:17 été / 05:17-06:17 hiver)
#   16:17 / 17:17 UTC -> soir  Prague (18:17 été / 17:17-18:17 hiver)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (exécution manuelle)"
        type: choice
        options: [morning, evening]
        default: morning
  schedule:
    - cron: '17 4 * * *'
    - cron: '17 5 * * *'
    - cron: '17 16 * * *'
    - cron: '17 17 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Garde + mode (heure de Prague)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "Exécution manuelle — mode=${{ github.event.inputs.mode }}"
          else
            H=$(TZ=Europe/Prague date +%H)
            echo "Heure Prague : ${H}h"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            if [ "$H" -lt 12 ]; then
              echo "mode=morning" >> "$GITHUB_OUTPUT"; echo "-> matin (créer / live)"
            else
              echo "mode=evening" >> "$GITHUB_OUTPUT"; echo "-> soir (mettre à jour + geler)"
            fi
          fi

      - name: Checkout
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/checkout@v4

      - name: Python
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.proceed == 'true'
        run: pip install yfinance pandas requests google-auth google-api-python-client

      - name: Mise à jour des prix
        if: steps.guard.outputs.proceed == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          RUN_MODE: ${{ steps.guard.outputs.mode }}
        run: python update_prix_gsheet.py

      - name: Ligne Évolution (matin = créer/live · soir = mettre à jour + geler)
        if: steps.guard.outputs.proceed == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          RUN_MODE: ${{ steps.guard.outputs.mode }}
        run: python update_evolution_gsheet.py
