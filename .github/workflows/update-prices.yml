name: Update prix Google Sheets (2x/jour)

# À placer dans le repo sous : .github/workflows/update-prices.yml
#
# Déclencheurs :
#   1) repository_dispatch (PRINCIPAL) : appelé par cron-job.org à 06:00 et 18:00
#      heure de Prague (fuseau géré par cron-job.org -> DST automatique, à l'heure pile).
#      event_type = "morning" ou "evening".
#   2) schedule (SECOURS) : crons UTC, au cas où l'appel externe échoue. Garde par
#      demi-journée (Prague). Idempotent : un double déclenchement est sans effet néfaste.
#   3) workflow_dispatch : lancement manuel (menu mode).

on:
  repository_dispatch:
    types: [morning, evening]
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (exécution manuelle)"
        type: choice
        options: [morning, evening]
        default: morning
  schedule:
    - cron: '17 4 * * *'
    - cron: '17 5 * * *'
    - cron: '17 16 * * *'
    - cron: '17 17 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Garde + mode
        id: guard
        run: |
          EV="${{ github.event_name }}"
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          if [ "$EV" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "Manuel — ${{ github.event.inputs.mode }}"
          elif [ "$EV" = "repository_dispatch" ]; then
            ACT="${{ github.event.action }}"
            if [ "$ACT" = "evening" ]; then echo "mode=evening" >> "$GITHUB_OUTPUT"; else echo "mode=morning" >> "$GITHUB_OUTPUT"; fi
            echo "Externe (cron-job.org) — $ACT"
          else
            H=$(TZ=Europe/Prague date +%H)
            echo "Planifié — Prague ${H}h"
            if [ "$H" -lt 12 ]; then echo "mode=morning" >> "$GITHUB_OUTPUT"; else echo "mode=evening" >> "$GITHUB_OUTPUT"; fi
          fi

      - name: Checkout
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/checkout@v4

      - name: Python
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.proceed == 'true'
        run: pip install yfinance pandas requests beautifulsoup4 openpyxl google-auth google-api-python-client

      - name: Mise à jour des prix
        if: steps.guard.outputs.proceed == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          RUN_MODE: ${{ steps.guard.outputs.mode }}
        run: python update_prix_gsheet.py

      - name: Ligne Évolution (matin = créer/live · soir = mettre à jour + geler)
        if: steps.guard.outputs.proceed == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          RUN_MODE: ${{ steps.guard.outputs.mode }}
        run: python update_evolution_gsheet.py

      - name: Compositions ETF (soir uniquement, 1x/jour)
        if: steps.guard.outputs.proceed == 'true' && steps.guard.outputs.mode == 'evening'
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          python update_etf_compo.py
          python upload_etf_to_gsheet.py
