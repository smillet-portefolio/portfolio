name: Update prix Google Sheets (2x/jour)

# À placer dans le repo GitHub sous :  .github/workflows/update-prices.yml
# Cron en UTC. Heure de Prague : été (CEST) = UTC+2, hiver (CET) = UTC+1.
#   - 04:00 UTC = 06:00 Prague (été)  /  05:00 Prague (hiver)
#   - 16:00 UTC = 18:00 Prague (été)  /  17:00 Prague (hiver)
# (décalage d'1 h en hiver ; dis-moi si tu veux un calage exact toute l'année)

on:
  workflow_dispatch:           # déclenchement manuel (app GitHub mobile)
  schedule:
    - cron: '0 4 * * *'        # matin  ~06:00 Prague — prix (+ ligne évolution si activée plus tard)
    - cron: '0 16 * * *'       # soir   ~18:00 Prague — prix

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas requests google-auth google-api-python-client

      - name: Déterminer le mode (matin / soir)
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            echo "mode=evening" >> "$GITHUB_OUTPUT"
          else
            echo "mode=morning" >> "$GITHUB_OUTPUT"
          fi

      - name: Mise à jour des prix (matin ET soir)
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          RUN_MODE: ${{ steps.mode.outputs.mode }}   # "morning" ou "evening"
        run: python update_prix_gsheet.py

      - name: Ligne Évolution (matin = créer/live · soir = mettre à jour + geler)
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          RUN_MODE: ${{ steps.mode.outputs.mode }}   # "morning" (live) ou "evening" (gel)
          # DRY_RUN: '1'   # décommente pour tester sans écrire dans le Sheet
        run: python update_evolution_gsheet.py
